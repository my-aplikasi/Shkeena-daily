<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SHKEENA DALIY</title>
  
  <style>
    /* Menghilangkan semua batas margin & padding bawaan browser */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Mencegah double scrollbar pada core browser */
      background-color: #ffffff;
    }

    /* Kontainer Utama pembungkus dipaksa memenuhi 100% dimensi layar aktif */
    .fullscreen-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* Iframe disetel menempati seluruh ruang kontainer tanpa border kaku */
    .fullscreen-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      z-index: 2;
    }

    /* Animasi Loading Minimalis (Aksen Sage Green bawaan Anda) */
    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1;
      gap: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #E2E8F0;
      border-top: 3px solid #8A9A5B; /* Sage Green */
      border-radius: 50%;
      animation: putar 0.7s linear infinite;
    }

    .loading-text {
      font-size: 0.82rem;
      color: #718096;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    @keyframes putar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="fullscreen-container">
    
    <div class="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Sinkronisasi Halaman</div>
    </div>
    
    <iframe 
      src="https://script.google.com/macros/s/AKfycbwdSgm1oT9KoxyqV5a-jjRjFH5zT8HPSd6I07ftKivyX8emAuCxBST2SGE7vcb-eF58Zg/exec"
      allowfullscreen="true"
      onload="selesaiMemuat()">
    </iframe>

  </div>

  <script>
    // Fungsi otomatis menghilangkan efek loading pasca server Google Apps Script siap
    function selesaiMemuat() {
      const loader = document.querySelector('.loading-screen');
      if (loader) {
        loader.style.transition = 'opacity 0.3s ease';
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 300);
      }
    }
  </script>

</body>
</html>
